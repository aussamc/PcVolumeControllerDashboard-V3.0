name: Build release .exe

# Produces a standalone self-contained win-x64 .exe on every push to main and
# publishes it as a GitHub Release asset (tagged v<version> from the csproj).
# Release assets do NOT count against the account's Actions artifact storage
# quota, so this build never accumulates storage the way upload-artifact did.

on:
  push:
    branches:
      - main

# gh release create/upload needs write access to repo contents.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path App.Avalonia/App.Avalonia.csproj -Pattern '<Version>(.*?)</Version>').Matches[0].Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish standalone exe
        run: >
          dotnet publish App.Avalonia/App.Avalonia.csproj
          -c Release
          -f net10.0-windows10.0.17763.0
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -o publish/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        shell: pwsh
        run: |
          if (-not (Test-Path "publish/PcVolumeControllerDashboard.Avalonia.exe")) {
            Write-Error "Expected publish/PcVolumeControllerDashboard.Avalonia.exe was not produced"
            exit 1
          }
          $tag = "v$env:VERSION"
          # Create the release if it does not exist yet, then (re)upload the asset,
          # clobbering any existing one so re-runs of the same version stay idempotent.
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated build for $tag"
          }
          gh release upload $tag "publish/PcVolumeControllerDashboard.Avalonia.exe" --clobber
